name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: build (node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20]
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - name: Install
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Test + coverage gate
        # Thresholds are declared in vitest.config.ts (under coverage.thresholds).
        # CI just asks for a coverage report; the gate is enforced by the config.
        # The previous follow-up step was redundant ("vitest run --coverage --reporter=text"
        # already prints the table inline at the end of the run), so it's gone.
        run: npm test -- --coverage
      - name: Upload coverage artifact
        if: matrix.node-version == '20'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
      - name: Build
        run: npm run build
